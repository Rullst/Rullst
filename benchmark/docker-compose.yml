version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: bench
      POSTGRES_PASSWORD: benchpassword
      POSTGRES_DB: benchdb
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bench -d benchdb"]
      interval: 2s
      timeout: 2s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  laravel:
    build:
      context: ./laravel
    ports:
      - "8001:8000"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: "base64:fH75Wp88s2vYl5z1VfG+8K5o3h9/Y+hH8D1o7Z6m6W8="
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: benchdb
      DB_USERNAME: bench
      DB_PASSWORD: benchpassword
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  symfony:
    build:
      context: ./symfony
    ports:
      - "8002:8000"
    environment:
      APP_ENV: prod
      APP_DEBUG: "0"
      DATABASE_URL: "postgresql://bench:benchpassword@postgres:5432/benchdb?serverVersion=15&charset=utf8"
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  django:
    build:
      context: ./django
    ports:
      - "8003:8000"
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  fastapi:
    build:
      context: ./fastapi
    ports:
      - "8004:8000"
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
