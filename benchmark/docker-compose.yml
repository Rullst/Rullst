version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: benchmarkdb
      POSTGRES_USER: benchmarkuser
      POSTGRES_PASSWORD: benchmarkpass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U benchmarkuser -d benchmarkdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  springboot:
    build:
      context: ./springboot
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/benchmarkdb

  quarkus:
    build:
      context: ./quarkus
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://db:5432/benchmarkdb
