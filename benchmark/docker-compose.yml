version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bench
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  poem:
    build:
      context: ./poem
      dockerfile: Dockerfile
    ports:
      - "3003:3000"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/bench
    depends_on:
      db:
        condition: service_healthy

  warp:
    build:
      context: ./warp
      dockerfile: Dockerfile
    ports:
      - "3004:3000"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/bench
    depends_on:
      db:
        condition: service_healthy

  leptos:
    build:
      context: ..
      dockerfile: benchmark/leptos/Dockerfile
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/bench
      - PORT=3000
    ports:
      - "3001:3000"
    depends_on:
      db:
        condition: service_healthy

  dioxus:
    build:
      context: ..
      dockerfile: benchmark/dioxus/Dockerfile
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/bench
      - PORT=3000
    ports:
      - "3002:3000"
    depends_on:
      db:
        condition: service_healthy
