# 🚀 Rullst Compiler & Linker Optimization Configuration
# Este arquivo configura linkers ultra-rápidos para desenvolvimento local.
# O Rullst detectou seu ambiente e configurou as opções adequadas.

# Para ativar no Windows (Instale LLVM com 'winget install LLVM.LLVM' e descomente abaixo):
# [target.x86_64-pc-windows-msvc]
# rustflags = ["-C", "link-arg=-fuse-ld=lld"]

# Para ativar no Linux (Instale o mold com seu gerenciador de pacotes e descomente abaixo):
# [target.x86_64-unknown-linux-gnu]
# rustflags = ["-C", "link-arg=-fuse-ld=mold"]

# Para ativar no macOS (Instale llvm/lld via brew e descomente abaixo):
# [target.x86_64-apple-darwin]
# rustflags = ["-C", "link-arg=-fuse-ld=lld"]
# [target.aarch64-apple-darwin]
# rustflags = ["-C", "link-arg=-fuse-ld=lld"]
