[package]
name = "rullst-macros"
version = "0.9.0"
edition = "2024"
description = "JSX-like compilation macros for Rullst framework"
license = "MIT"
readme = "../README.md"
repository = "https://github.com/venelouis/Rullst"

[lib]
proc-macro = true

[dependencies]
syn = { version = "2.0", features = ["full", "extra-traits"] }
quote = "1.0"
proc-macro2 = "1.0"
