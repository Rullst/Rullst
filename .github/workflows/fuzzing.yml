name: Fuzzing (cargo-fuzz)

on:
  workflow_dispatch: # Manual trigger only

permissions:
  contents: read

jobs:
  fuzz:
    name: Run Fuzzers (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [
          mask_pii, html_escape, routing,
          validation_json, auth_crypto, auth_session,
          security_csrf, security_waf, htmx_headers,
          config_parser, multitenant_resolver, ws_payload
        ]
    steps:
      - uses: actions/checkout@v4 # v7

      - name: Install Rust Nightly
        uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
        with:
          toolchain: nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Run Fuzzer for ~6 hours (${{ matrix.target }})
        working-directory: rullst/fuzz
        # We run the fuzzer for a maximum of 21000 seconds (5 hours 50 minutes)
        # to ensure it completes before the 6h GitHub Actions hard limit.
        run: cargo +nightly fuzz run ${{ matrix.target }} -- -max_total_time=21000
