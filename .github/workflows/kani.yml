name: Kani Verifier

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  kani:
    name: kani
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Install Kani
        run: cargo install kani-verifier && cargo kani setup

      - name: Verify rullst-macros with Kani
        # Kani ships its own nightly (1.93 as of v0.67); run only on the proc-macro
        # crate which has no MSRV or crypto deps that would conflict.
        # NOTE: requires at least one #[kani::proof] harness to verify.
        working-directory: rullst-macros
        continue-on-error: true
        run: cargo kani

      - name: Verify rullst (main framework) with Kani
        working-directory: rullst
        continue-on-error: true
        run: cargo kani
