name: Kani Verifier

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  kani:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install Kani
        run: cargo install kani-verifier && cargo kani setup

      - name: Verify rullst-macros with Kani
        # Kani ships its own nightly; run only on the proc-macro crate
        # (no MSRV conflict — rullst-macros has minimal deps)
        working-directory: rullst-macros
        run: cargo kani
