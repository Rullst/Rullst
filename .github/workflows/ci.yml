name: Rust CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CARGO_NET_RETRY: 10

defaults:
  run:
    working-directory: Rullst

jobs:
  check:
    name: Code Quality & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Rullst
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          path: Rullst

      - name: Checkout rullst-orm
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          repository: venelouis/rullst-orm
          path: rullst-orm

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --package rullst --package rullst-macros --package cargo-rullst --package rullst-blog-example -- --check

      # Run clippy with default features (no feature-exclusive conflicts)
      - name: Run Clippy (default features)
        run: cargo clippy --workspace --all-targets -- -D warnings

      # Separately lint optional redis features
      - name: Run Clippy (redis features)
        run: cargo clippy -p rullst --all-targets --features cache-redis,queue-redis -- -D warnings

      # Separately lint optional mail-smtp feature
      - name: Run Clippy (mail-smtp feature)
        run: cargo clippy -p rullst --all-targets --features mail-smtp -- -D warnings

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Rullst
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          path: Rullst

      - name: Checkout rullst-orm
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          repository: venelouis/rullst-orm
          path: rullst-orm

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1

      - name: Run all workspace tests
        run: cargo test --workspace
