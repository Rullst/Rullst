name: Mutation Testing (cargo-mutants)

on:
  workflow_dispatch: # Manual trigger only

permissions:
  contents: read

jobs:
  mutants:
    name: Run cargo-mutants
    runs-on: ubuntu-latest
    # Mutation testing can take a long time, so we set a timeout
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install cargo-mutants
        run: cargo install cargo-mutants

      - name: Run cargo-mutants (Core Library)
        # We focus mutation testing on the core 'rullst' crate to avoid mutating examples or scaffolding generators which may not have exhaustive tests
        run: cargo mutants -p rullst -v
        
      - name: Archive Mutants Report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mutants-report
          path: mutants.out/
