name: Mutation Testing (cargo-mutants)

on:
  workflow_dispatch: # Manual trigger only

permissions:
  contents: read

jobs:
  mutants:
    name: Run cargo-mutants (Shard ${{ matrix.shard }}/${{ matrix.total }})
    runs-on: ubuntu-latest
    # Mutation testing can take a long time, so we set a timeout
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
        total: [8]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # stable
        with:
          toolchain: stable

      - name: Install cargo-mutants
        run: cargo install cargo-mutants

      - name: Run cargo-mutants (Core Library)
        # We focus mutation testing on the core 'rullst' crate to avoid mutating examples or scaffolding generators which may not have exhaustive tests
        run: cargo mutants -p rullst -j 1 --shard ${{ matrix.shard }}/${{ matrix.total }} -v
        
      - name: Archive Mutants Report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mutants-report-shard-${{ matrix.shard }}
          path: mutants.out/
