name: Benchmark Regression

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Rullst
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1

      - name: Run cargo bench
        run: cargo bench -p rullst --bench rullst_bench -- --output-format bencher | tee output.txt

      - name: GitHub Action Benchmark
        uses: benchmark-action/github-action-benchmark@d48d326b4ca9ba73ca0cd0d59f108f9e02a381c7 # v1.20.4
        with:
          tool: 'cargo'
          output-file-path: output.txt
          fail-on-alert: true
          # Alert threshold set to 300% to avoid noisy neighbors on GitHub Actions runners for microbenchmarks (ns scale)
          alert-threshold: '300%'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          comment-on-alert: true
          # Only push to gh-pages when running on main branch, not on PRs
          auto-push: ${{ github.event_name != 'pull_request' }}
          benchmark-data-dir-path: 'benches'

      - name: Deploy Custom Dashboard Templates
        if: github.event_name != 'pull_request'
        run: |
          # Fetch the latest gh-pages branch pushed by the previous step
          git fetch origin gh-pages
          git checkout gh-pages
          
          # Grab templates from main branch
          git checkout origin/main -- docs/home_template.html docs/benches_template.html
          
          # Apply them
          cp docs/home_template.html index.html
          mkdir -p benches
          cp docs/benches_template.html benches/index.html
          
          # Clean up
          rm -rf docs
          
          # Commit and push
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html benches/index.html
          git commit -m "style: Apply custom beautiful templates to gh-pages" || echo "No changes to commit"
          git push origin gh-pages
