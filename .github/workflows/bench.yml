name: Benchmark Regression

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    working-directory: Rullst

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Rullst
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: Rullst

      - name: Checkout rullst-orm
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: venelouis/rullst-orm
          path: rullst-orm

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1

      - name: Run cargo bench
        run: cargo bench -p rullst --bench rullst_bench -- --output-format bencher | tee output.txt

      - name: GitHub Action Benchmark
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba # v1
        with:
          tool: 'cargo'
          output-file-path: Rullst/output.txt
          fail-on-alert: true
          # Alert threshold set to 130% to avoid noisy neighbors on GitHub Actions runners
          alert-threshold: '130%'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          comment-on-alert: true
          # Only push to gh-pages when running on main branch, not on PRs
          auto-push: ${{ github.event_name != 'pull_request' }}
