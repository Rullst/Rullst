name: Miri UB Detection

on:
  workflow_dispatch: # Manual trigger only

permissions:
  contents: read

jobs:
  miri:
    name: Run Miri (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Sharding the execution by workspace packages to prevent timeouts
        package: [rullst, rullst-macros, cargo-rullst]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Install Rust Nightly with Miri
        uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
        with:
          toolchain: nightly
          components: miri

      - name: Run Cargo Miri
        env:
          MIRIFLAGS: -Zmiri-disable-isolation
        # Skip tests that invoke C FFI via ring/aws-lc-rs (TLS, crypto, passkey).
        # Miri cannot emulate foreign C functions — these are network/crypto integration
        # tests already covered by the regular CI test suite.
        run: |
          cargo +nightly miri test -p ${{ matrix.package }} -- \
            --skip auth::passkey \
            --skip auth::jwt \
            --skip auth::oauth \
            --skip ai::tests::test_ai_providers_network_errors
