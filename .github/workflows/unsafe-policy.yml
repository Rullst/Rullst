name: Unsafe Policy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  unsafe-scan:
    name: Scan for unsafe code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Scan for unsafe blocks in first-party code
        run: |
          echo "=== Scanning for unsafe blocks in Rullst source code ==="
          # Find all unsafe usages in our own source, excluding generated/vendor code
          UNSAFE_COUNT=$(rg --type rust 'unsafe' rullst/src/ rullst-macros/src/ cargo-rullst/src/ --count-matches | awk -F: '{s+=$2} END {print s}')
          echo "Total unsafe occurrences: $UNSAFE_COUNT"

          # List them for audit trail
          rg --type rust 'unsafe' rullst/src/ rullst-macros/src/ cargo-rullst/src/ \
            --heading --line-number || true

          # Fail if there are any unexpected unsafe blocks
          # (adjust threshold if your codebase intentionally uses unsafe)
          if [ "$UNSAFE_COUNT" -gt 0 ]; then
            echo ""
            echo "⚠️  Found $UNSAFE_COUNT unsafe usage(s) in first-party code."
            echo "Review the list above. If intentional, document each with a SAFETY comment."
            # Exit 0 to treat as audit/info-only (change to exit 1 to enforce zero-unsafe)
            exit 0
          else
            echo "✅ No unsafe blocks found in first-party code."
          fi
