name: Release to crates.io

# This workflow ONLY runs when a new version tag is pushed (e.g. v1.0.5)
# It will NOT run on regular commits to main or dev.
# To release: merge dev -> main, bump versions, push tag v1.X.X

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    working-directory: Rullst

jobs:
  # Step 1: Run full test suite before publishing anything
  verify:
    name: Verify before release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Rullst
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          path: Rullst

      - name: Checkout rullst-orm
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          repository: venelouis/rullst-orm
          path: rullst-orm

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --package rullst --package rullst-macros --package cargo-rullst --package rullst-blog-example -- --check

      - name: Run Clippy (strict)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run all workspace tests
        run: cargo test --workspace

  publish:
    name: Publish to crates.io and GitHub
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - name: Checkout Rullst
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          path: Rullst

      - name: Checkout rullst-orm
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          repository: venelouis/rullst-orm
          path: rullst-orm

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1

      - name: Package crates
        run: |
          cargo package -p rullst-macros
          cargo package -p rullst
          cargo package -p cargo-rullst

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish rullst-macros
        run: cargo publish -p rullst-macros
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Wait for rullst-macros to be indexed
        run: sleep 30

      - name: Publish rullst
        run: cargo publish -p rullst
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Wait for rullst to be indexed
        run: sleep 30

      - name: Publish cargo-rullst
        run: cargo publish -p cargo-rullst
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Generate Hashes for SLSA
        id: hash
        run: |
          cd target/package
          sha256sum *.crate > checksums.txt
          echo "hashes=$(cat checksums.txt | base64 -w0)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and Upload Crates
        uses: softprops/action-gh-release@v2
        with:
          files: Rullst/target/package/*.crate

  provenance:
    name: Generate SLSA 3 Provenance
    needs: [publish]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
    with:
      base64-subjects: "${{ needs.publish.outputs.hashes }}"
      upload-assets: true
