name: Spellcheck CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  spellcheck:
    name: Typo Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: crate-ci/typos@37bb98842b0d8c4ffebdb75301a13db0267cef89 # HEAD
