name: Spellcheck CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  spellcheck:
    name: Typo Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: crate-ci/typos@37bb98842b0d8c4ffebdb75301a13db0267cef89 # HEAD
