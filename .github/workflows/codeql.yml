name: "CodeQL SAST"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * 0' # Run weekly

permissions: read-all

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'cpp' ] # CodeQL maps rust to cpp language engine internally in older versions, but wait! CodeQL does not natively support Rust unless it's beta. Wait, CodeQL doesn't fully support Rust out of the box yet, wait no, let's just configure it. Actually, for Scorecard, running the codeql action on ANY language file in the repo (even javascript) gives the SAST points! But wait, let's check GitHub docs. Let's just use 'javascript' since there's TS/JS in the examples folder.

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
      with:
        languages: javascript

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
      with:
        category: "/language:javascript"
