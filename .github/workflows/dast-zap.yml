name: OWASP ZAP (Dynamic Application Security Testing)

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 2 * * 0' # Run weekly

permissions: read-all

jobs:
  zap_scan:
    name: ZAP Baseline Scan
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # stable
        with:
          toolchain: stable

      - name: Install cargo-rullst
        run: cargo install --path cargo-rullst

      - name: Scaffold Rullst SaaS Blueprint
        run: |
          cargo rullst new zap_test
          # Configure dummy keys to allow server start
          echo "APP_KEY=12345678901234567890123456789012" >> zap_test/.env
          echo "APP_ENV=production" >> zap_test/.env
          echo "DATABASE_URL=sqlite://db.sqlite3" >> zap_test/.env

      - name: Build Rullst Server
        working-directory: zap_test
        run: cargo build

      - name: Run Rullst Server in background
        working-directory: zap_test
        run: |
          # We use cargo run to start the backend (compilation is already done)
          cargo run &
          # Wait for the server to be ready on port 3000
          sleep 5
          curl -s --retry 10 --retry-connrefused --retry-delay 2 http://localhost:3000 > /dev/null

      - name: Generate ZAP Rules to Ignore CDN False Positives
        run: |
          mkdir -p .zap
          # 10055 = CSP unsafe-inline / unsafe-eval (required for Tailwind/HTMX CDNs)
          # 90003 = Sub Resource Integrity Attribute Missing (dynamic CDN versions)
          # 10017 = Cross-Domain JavaScript (CDN scripts)
          # 10109 = Modern Web Application (Informational)
          # 90004 = Cross-Origin-Embedder-Policy (Handled by production middleware)
          # 10049 = Storable and Cacheable Content (Handled by production middleware)
          echo -e "10055\tIGNORE\t(CSP)\n90003\tIGNORE\t(SRI)\n10017\tIGNORE\t(Cross-Domain)\n10109\tIGNORE\t(Modern Web App)\n90004\tIGNORE\t(COEP/CORP)\n10049\tIGNORE\t(Cache-Control)" > .zap/rules.tsv

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@7c4deb10e6261301961c86d65d54a516394f9aed # v0.14.0
        with:
          target: 'http://localhost:3000'
          rules_file_name: '.zap/rules.tsv'
          fail_action: false # Only warn for now, avoid breaking CI on first run
