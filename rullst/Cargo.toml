[package]
name = "rullst"
version = "0.5.0"
edition = "2024"
description = "O framework fullstack definitivo para Rust, com foco em DX, velocidade e segurança."
license = "MIT"
readme = "../README.md"
repository = "https://github.com/venelouis/Rullst"

[features]
default = []
queue-redis = ["dep:redis"]
cache-redis = ["dep:redis"]
mail-smtp = ["dep:lettre"]
storage-s3 = ["dep:aws-config", "dep:aws-sdk-s3"]

[dependencies]
axum = { version = "0.7", features = ["macros", "ws"] }
tokio = { version = "1.43", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rullst-macros = { version = "0.5.0", path = "../rullst-macros" }
rust-eloquent = "1.1.0"
sqlx = { version = "0.8", features = ["sqlite", "postgres", "mysql", "any", "runtime-tokio", "macros"] }
tower = { version = "0.4", features = ["util"] }
tower-http = { version = "0.5", features = ["fs", "trace"] }
tower-layer = "0.3"
tower-service = "0.3"
async-trait = "0.1"
argon2 = "0.5"
cookie = { version = "0.18", features = ["percent-encoding"] }
rand = "0.8"
aes-gcm = "0.10"
base64 = "0.22"

# Milestone 5: Production Utilities
uuid = { version = "1", features = ["v4"] }
dashmap = "6"
cron = "0.15"
chrono = "0.4"
redis = { version = "0.27", features = ["tokio-comp", "aio"], optional = true }

# Milestone 6: Enterprise Features
validator = { version = "0.19", features = ["derive"] }
lettre = { version = "0.11", optional = true, features = ["tokio1", "tokio1-rustls-tls"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
aws-config = { version = "1", optional = true }
aws-sdk-s3 = { version = "1", optional = true }



