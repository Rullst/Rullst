# cargo-deny configuration for Rullst Framework

[advisories]
# Ignore some vulnerabilities if we can't update them yet.
# Same list as cargo audit in security-audit.yml
ignore = [
    "RUSTSEC-2026-0099",
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0104",
    "RUSTSEC-2026-0002",
    "RUSTSEC-2023-0071",
    "RUSTSEC-2026-0173",
]

[licenses]
# We allow typical open-source licenses compatible with MIT framework
allow = [
    "MIT",
    "Apache-2.0",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Zlib",
    "OpenSSL",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "BSL-1.0",
    "0BSD",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "CC0-1.0",
]
confidence-threshold = 0.8
exceptions = []

[[licenses.clarify]]
name = "ring"
version = "*"
expression = "OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 }
]

[bans]
multiple-versions = "warn"
highlight = "all"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
