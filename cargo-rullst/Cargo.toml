[package]
name = "cargo-rullst"
version = "0.5.0"
edition = "2024"
description = "A interface de linha de comando (CLI) oficial para gerenciar aplicações Rullst."
license = "MIT"
readme = "../README.md"
repository = "https://github.com/venelouis/Rullst"

[[bin]]
name = "cargo-rullst"
path = "src/main.rs"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
colored = "2.1"
chrono = "0.4"
