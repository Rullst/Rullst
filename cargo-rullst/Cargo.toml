[package]
name = "cargo-rullst"
version = "0.9.2"
edition = "2024"
description = "A interface de linha de comando (CLI) oficial para gerenciar aplicações Rullst."
license = "MIT"
readme = "../README.md"
repository = "https://github.com/venelouis/Rullst"

[[bin]]
name = "cargo-rullst"
path = "src/main.rs"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
colored = "2.1"
chrono = "0.4"
dialoguer = "0.12.0"
regex = "1.10"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
